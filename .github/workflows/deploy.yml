name: Deploy NoNotes Website

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nonotes-website-test .

      - name: Verify nginx config and HTML
        run: |
          docker run --rm nonotes-website-test nginx -t
          docker run --rm nonotes-website-test test -f /usr/share/nginx/html/index.html

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/production/website-nonotes
            git pull origin main
            docker compose up -d --build
